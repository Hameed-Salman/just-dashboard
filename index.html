<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <title>JUST Admin Panel</title>
  <style>
    body { font-family: 'Tajawal', sans-serif; }
  </style>
</head>

<body class="bg-gray-100">

<!-- LOGIN -->
<div id="loginPage" class="h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-2xl shadow w-80">
    <h2 class="text-xl font-bold mb-4 text-center">Admin Login</h2>

    <input id="username" class="w-full mb-3 p-2 border rounded" placeholder="Username" />
    <input id="password" type="password" class="w-full mb-3 p-2 border rounded" placeholder="Password" />

    <button onclick="login()" class="w-full bg-blue-600 text-white py-2 rounded">
      Login
    </button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <!-- Navbar -->
  <div class="bg-white shadow p-4 flex justify-between">
    <h1 class="font-bold text-blue-600">JUST Dashboard</h1>
    <button onclick="logout()" class="text-red-500">Logout</button>
  </div>

  <div class="p-6 grid md:grid-cols-3 gap-6">

    <!-- INFO -->
    <div class="bg-white p-4 rounded-xl shadow">
      <h2 class="font-bold mb-3">Add Info</h2>

      <input id="infoName" class="w-full mb-2 p-2 border rounded" placeholder="Name" />
      <input id="infoDesc" class="w-full mb-2 p-2 border rounded" placeholder="Description" />
      <input id="infoLoc" class="w-full mb-2 p-2 border rounded" placeholder="Location" />

      <button onclick="addInfo()" class="w-full bg-blue-500 text-white p-2 rounded">
        Save
      </button>
    </div>

    <!-- IMAGE -->
    <div class="bg-white p-4 rounded-xl shadow">
      <h2 class="font-bold mb-3">Upload Image</h2>

      <input id="image" type="file" class="w-full mb-2" />

      <button onclick="uploadImage()" class="w-full bg-green-500 text-white p-2 rounded">
        Upload
      </button>
    </div>

    <!-- ADMIN -->
    <div class="bg-white p-4 rounded-xl shadow">
      <h2 class="font-bold mb-3">Add Admin</h2>

      <input id="newUser" class="w-full mb-2 p-2 border rounded" placeholder="Username" />
      <input id="newPass" type="password" class="w-full mb-2 p-2 border rounded" placeholder="Password" />

      <button onclick="addAdmin()" class="w-full bg-purple-500 text-white p-2 rounded">
        Create
      </button>
    </div>

  </div>

  <!-- LIVE DATA -->
  <div class="p-6">
    <div id="liveData" class="bg-white p-4 rounded-xl shadow"></div>
  </div>

</div>

<script>
const API = "https://just-api-g4tz.onrender.com/api";

/* ================= LOGIN ================= */
async function login() {
  const res = await fetch(`${API}/auth/login`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    showDashboard();
    loadUniversity();
  } else {
    alert("Login failed");
  }
}

/* ================= DASHBOARD UI ================= */
function showDashboard() {
  loginPage.classList.add("hidden");
  dashboard.classList.remove("hidden");
}

function logout() {
  localStorage.removeItem("token");
  location.reload();
}

/* ================= LOAD DATA ================= */
async function loadUniversity() {
  const res = await fetch(`${API}/university`);
  const data = await res.json();

  document.getElementById("liveData").innerHTML = `
    <h2 class="text-xl font-bold mb-2">${data.name || ""}</h2>
    <p class="mb-1">${data.description || ""}</p>
    <p class="text-gray-500 mb-4">${data.location || ""}</p>

    <div class="grid grid-cols-2 gap-2">
      ${(data.images || []).map(img => `
        <img src="${img}" class="rounded h-24 w-full object-cover"/>
      `).join("")}
    </div>
  `;
}

/* ================= ADD INFO ================= */
async function addInfo() {
  const token = localStorage.getItem("token");

  await fetch(`${API}/university`, {
    method: "POST",
    headers: {
      Authorization: "Bearer " + token,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: infoName.value,
      description: infoDesc.value,
      location: infoLoc.value
    })
  });

  loadUniversity(); // 🔥 instant update
}

/* ================= UPLOAD IMAGE ================= */
async function uploadImage() {
  const token = localStorage.getItem("token");

  const formData = new FormData();
  const file = image.files[0];

  if (!file) return;

  formData.append("image", file);

  await fetch(`${API}/university`, {
    method: "POST",
    headers: {
      Authorization: "Bearer " + token
    },
    body: formData
  });

  loadUniversity(); // 🔥 instant update
}

/* ================= ADD ADMIN ================= */
async function addAdmin() {
  await fetch(`${API}/auth/register`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      username: newUser.value,
      password: newPass.value
    })
  });

  alert("Admin created");
}

/* ================= AUTO REFRESH ================= */
setInterval(loadUniversity, 5000);

/* ================= INIT ================= */
if (localStorage.getItem("token")) {
  showDashboard();
  loadUniversity();
}
</script>

</body>
</html>
